:root, [data-theme="light"] {
  --bg:#f7f6f2; --surface:#fbfbf9; --surface-2:#f1eee8; --border:#d4d1ca; --text:#28251d; --muted:#706c65;
  --primary:#01696f; --primary-2:#0c4e54; --green:#2f8f52; --amber:#d19900; --red:#b74331;
  --shadow:0 10px 24px rgba(18,18,18,.08); --radius:20px; --font:'Satoshi',system-ui,sans-serif;
  --dial-face:#ffffff; --dial-ring:#1c1b19;
}
[data-theme="dark"] {
  --bg:#171614; --surface:#1c1b19; --surface-2:#26231f; --border:#3a3732; --text:#ebe5db; --muted:#ada597;
  --primary:#4f98a3; --primary-2:#227f8b; --green:#5eb46f; --amber:#f0bc45; --red:#d76c59;
  --shadow:0 14px 30px rgba(0,0,0,.28);
  --dial-face:#e9e7e2; --dial-ring:#0e0d0c;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body { font-family:var(--font); background:linear-gradient(180deg,var(--bg),var(--surface-2)); color:var(--text); min-height:100dvh; }
.app { max-width:900px; margin:0 auto; padding:1.2rem 1rem 3rem; }
.top { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:1.4rem; }
.logo-row { display:flex; gap:.8rem; align-items:flex-start; }
.logo { width:44px; height:44px; border-radius:14px; background:var(--primary); color:#fff; display:grid; place-items:center; box-shadow:var(--shadow); flex:0 0 auto; }
.logo svg { width:24px; height:24px; }
h1 { margin:0 0 .3rem; font-size:clamp(1.4rem,1.15rem + 1.15vw,2rem); line-height:1.1; }
.sub { color:var(--muted); font-size:.95rem; max-width:56ch; }
.theme { min-width:44px; min-height:44px; border-radius:999px; background:var(--surface); color:var(--text); border:1px solid var(--border); padding:0 1rem; font:inherit; cursor:pointer; }

.tumbler-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:1.1rem 1.2rem; margin-bottom:1.4rem; display:flex; justify-content:space-between; align-items:center; gap:1.2rem; flex-wrap:wrap; }
.tumbler-info h2 { margin:0 0 .3rem; font-size:1.05rem; }
.tumbler-info p { margin:0; color:var(--muted); font-size:.85rem; max-width:34ch; }

.lever-switch { position:relative; width:76px; height:150px; flex:0 0 auto; cursor:pointer; }
.lever-track { position:absolute; inset:0; border-radius:20px; background:linear-gradient(180deg,#8f9296,#5c5f63); box-shadow:inset 0 3px 8px rgba(0,0,0,.35), 0 6px 14px rgba(0,0,0,.2); border:3px solid #3d3f42; }
.lever-label { position:absolute; left:0; right:0; text-align:center; font-weight:900; font-size:.72rem; letter-spacing:.05em; color:#fff; }
.lever-label.on { top:10px; } .lever-label.off { bottom:10px; }
.lever-thumb-wrap { position:absolute; left:50%; top:50%; width:56px; height:56px; transform:translate(-50%,-50%); }
.lever-stick { position:absolute; left:50%; top:50%; width:14px; height:110px; background:linear-gradient(180deg,#d7dadd,#9aa0a5); border-radius:8px; transform:translate(-50%,-50%); transform-origin:center center; transition:transform .35s cubic-bezier(.34,1.56,.64,1); box-shadow:0 3px 6px rgba(0,0,0,.3); }
.lever-thumb { position:absolute; left:50%; top:12px; width:34px; height:34px; border-radius:50%; transform:translateX(-50%); box-shadow:0 4px 10px rgba(0,0,0,.35), inset 0 2px 3px rgba(255,255,255,.4); border:2px solid rgba(0,0,0,.25); }
.lever-switch.state-on .lever-stick { transform:translate(-50%,-50%) rotate(-22deg); }
.lever-switch.state-off .lever-stick { transform:translate(-50%,-50%) rotate(22deg); }
.lever-switch.state-on .lever-thumb { background:radial-gradient(circle at 35% 30%, #6fc3e8, #1f7fb8); top:2px; }
.lever-switch.state-off .lever-thumb { background:radial-gradient(circle at 35% 30%, #f0837a, #b8321f); top:96px; }

.dial-wrap { display:flex; justify-content:center; margin:1.6rem 0 1.2rem; }
.dial-outer { position:relative; width:min(320px,88vw); aspect-ratio:1/1; border-radius:50%; background:radial-gradient(circle at 32% 26%, #3a3a3a, #101010 68%); box-shadow:var(--shadow), inset 0 0 0 6px rgba(255,255,255,.04); padding:6%; }
.dial-face { position:absolute; inset:6%; border-radius:50%; background:var(--dial-face); box-shadow:inset 0 3px 10px rgba(0,0,0,.15); transform:rotate(0deg); }
.hole-ring { position:absolute; inset:0; }
.hole { position:absolute; width:15%; height:15%; border-radius:50%; background:var(--dial-ring); color:#fff; display:grid; place-items:center; font-weight:900; font-size:1rem; transition:transform .2s cubic-bezier(.34,1.56,.64,1), background .2s ease, box-shadow .2s ease; cursor:pointer; text-decoration:none; box-shadow:0 2px 4px rgba(0,0,0,.2); border:none; font-family:inherit; }
.hole:hover, .hole:focus-visible { transform:translate(-50%,-50%) scale(1.14); background:var(--primary); box-shadow:0 6px 14px rgba(0,0,0,.3); }
.hole.locked { opacity:.4; cursor:not-allowed; }
.hole.locked:hover { transform:translate(-50%,-50%); background:var(--dial-ring); box-shadow:0 2px 4px rgba(0,0,0,.2); }
.dial-outer.dialing .hole { pointer-events:none; }

.finger-stop { position:absolute; width:10%; height:18%; background:var(--dial-ring); border-radius:5px; z-index:3; }
.dial-hub { position:absolute; top:50%; left:50%; width:30%; height:30%; transform:translate(-50%,-50%); border-radius:50%; background:var(--primary); color:#fff; display:grid; place-items:center; font-weight:900; font-size:.68rem; text-align:center; padding:.4rem; box-shadow:0 6px 16px rgba(0,0,0,.25); z-index:4; }

.dial-readout { text-align:center; min-height:1.4rem; margin-bottom:1.4rem; font-weight:800; letter-spacing:.06em; color:var(--muted); font-size:.95rem; }
.dial-readout .active-num { color:var(--primary); }

.cartridge-grid { display:grid; gap:1rem; }
.cartridge { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:1.1rem 1.2rem; display:flex; justify-content:space-between; align-items:center; gap:1rem; text-decoration:none; color:inherit; transition:transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s ease, background .25s ease; }
.cartridge:hover { transform:translateY(-2px); box-shadow:0 16px 32px rgba(18,18,18,.12); }
.cartridge.locked { opacity:.6; cursor:default; }
.cartridge.locked:hover { transform:none; }
.cartridge.highlight { background:color-mix(in srgb,var(--primary) 10%,var(--surface)); }
.cart-left { display:flex; gap:.9rem; align-items:center; }
.cart-num { width:42px; height:42px; border-radius:50%; background:var(--surface-2); color:var(--muted); display:grid; place-items:center; font-weight:900; }
.cart-num.ready { background:var(--primary); color:#fff; }
.cart-title { font-weight:800; font-size:1.02rem; }
.cart-desc { color:var(--muted); font-size:.85rem; margin-top:.15rem; }
.status { font-size:.78rem; font-weight:700; padding:.32rem .6rem; border-radius:999px; white-space:nowrap; }
.status.ready { background:color-mix(in srgb,var(--green) 18%,var(--surface)); color:var(--green); }
.status.soon { background:color-mix(in srgb,var(--amber) 20%,var(--surface)); color:var(--amber); }
.status.empty { background:var(--surface-2); color:var(--muted); }
.directory-modal { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:1000; }
.directory-modal[hidden] { display:none; }
.directory-content { background:var(--surface); border-radius:var(--radius); padding:1.2rem; width:min(360px,88vw); max-height:70vh; overflow-y:auto; box-shadow:var(--shadow); }
.directory-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.8rem; }
.directory-close { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--text); }
.directory-list { list-style:none; padding:0; margin:0; }
.directory-list li { padding:.6rem 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:.6rem; cursor:pointer; }
.directory-list li:hover { background:var(--surface-2); }
@media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo-row">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/></svg>
      </div>
      <div>
        <h1>Барабан выбиратора</h1>
        <div class="sub">Крути диск как на старом телефоне: набери номер сценария, и он подсветится в списке ниже.</div>
      </div>
    </div>
    <button class="theme" id="themeToggle">Тема</button>
  </header>

  <section class="tumbler-card">
    <div class="tumbler-info">
      <h2>Контекст выбора</h2>
      <p id="ctxNote"></p>
    </div>
    <div class="lever-switch state-on" id="leverSwitch" role="switch" aria-checked="true" tabindex="0" aria-label="Переключатель контекста">
      <div class="lever-track">
        <div class="lever-label on">ДЛЯ СЕБЯ</div>
        <div class="lever-label off">ДЛЯ РАБОТЫ</div>
      </div>
      <div class="lever-thumb-wrap">
        <div class="lever-stick"></div>
        <div class="lever-thumb"></div>
      </div>
    </div>
  </section>

  <div class="dial-wrap">
    <div class="dial-outer" id="dialOuter">
      <div class="dial-face" id="dialFace">
        <div class="hole-ring" id="holeRing"></div>
      </div>
      <div class="finger-stop" id="fingerStop"></div>
     <button type="button" class="dial-hub" id="dialHub">Набери номер</button>
    </div>
  </div>
  <div class="dial-readout" id="dialReadout">Номер не набран</div>

  <section class="cartridge-grid" id="cartridges"></section>
</div>
<div class="directory-modal" id="directoryModal" hidden>
  <div class="directory-content">
    <div class="directory-header">
      <h3>Справочник номеров</h3>
      <button type="button" class="directory-close" id="directoryClose">×</button>
    </div>
    <ul class="directory-list" id="directoryList"></ul>
  </div>
</div>

<script>
/* "Телефонный справочник" барабана — единственное место, где нужно менять
   соответствие цифры и сценария. Диск и список карточек ничего не знают
   про конкретные патроны, они просто читают этот справочник. */
const DIRECTORY = [
  { number: '1', id: 'vacuum',     title: 'Выбиратор пылесоса',   desc: 'Пьедестал 1-2-3 и стоимость одной уборки', status: 'ready', href: './patrons/vacuum.html' },
  { number: '2', id: 'job',        title: 'Выбиратор работы',      desc: 'Патрон в разработке', status: 'soon', href: null },
  { number: '3', id: 'car',        title: 'Выбиратор машины',      desc: 'Патрон в разработке', status: 'soon', href: null },
  { number: '4', id: 'contractor', title: 'Выбиратор подрядчика',  desc: 'Патрон в разработке', status: 'soon', href: null },
  { number: '5', id: null,         title: 'Свободный номер',       desc: 'Зарезервирован под будущий сценарий', status: 'empty', href: null },
  { number: '6', id: null,         title: 'Свободный номер',       desc: 'Зарезервирован под будущий сценарий', status: 'empty', href: null },
  { number: '7', id: null,         title: 'Свободный номер',       desc: 'Зарезервирован под будущий сценарий', status: 'empty', href: null },
  { number: '8', id: null,         title: 'Свободный номер',       desc: 'Зарезервирован под будущий сценарий', status: 'empty', href: null },
  { number: '9', id: null,         title: 'Свободный номер',       desc: 'Зарезервирован под будущий сценарий', status: 'empty', href: null },
  { number: '0', id: 'settings',   title: 'Настройки барабана',    desc: 'Системный номер, не сценарий сравнения', status: 'empty', href: null }
];

const ctxNotes = {
  personal: 'Режим "для себя": веса и коэффициенты считаются исходя из личного бюджета, личного времени и бытовых сценариев.',
  business: 'Режим "для бизнеса": в расчёт добавляются налоговые ставки для юрлиц, амортизация как для актива компании и другая логика окупаемости времени сотрудников.'
};
let currentCtx = 'personal';
let dialing = false;

function renderCartridges() {
  const grid = document.getElementById('cartridges');
  grid.innerHTML = DIRECTORY.map(c => {
    const isReady = c.status === 'ready';
    const tag = isReady ? 'a' : 'div';
    const hrefAttr = isReady ? `href="${c.href}"` : '';
    const statusLabel = c.status === 'ready' ? 'Готов' : (c.status === 'soon' ? 'Скоро' : 'Свободно');
    return `
      <${tag} class="cartridge ${isReady ? '' : 'locked'}" data-number="${c.number}" ${hrefAttr}>
        <div class="cart-left">
          <div class="cart-num ${isReady ? 'ready' : ''}">${c.number}</div>
          <div>
            <div class="cart-title">${c.title}</div>
            <div class="cart-desc">${c.desc}</div>
          </div>
        </div>
        <div class="status ${c.status}">${statusLabel}</div>
      </${tag}>`;
  }).join('');
}

/* ГЕОМЕТРИЯ ДИСКА — 11 равных секторов по кругу:
   10 секторов с отверстиями (цифры 1..9, 0) и 1 закрытый (пустой) сектор.
   Ограничитель — фиксированная деталь корпуса (не крутится), стоит у цифры "0".
   Пустой сектор лежит между ограничителем и цифрой "1".
   Порядок по часовой стрелке от ограничителя: [пусто] -> 1 -> 2 -> ... -> 9 -> 0 -> [ограничитель]. */
const SLOTS = 11;
const STEP = 360 / SLOTS;
const STOP_ANGLE = 120; // фиксированное положение ограничителя на корпусе (визуально, как на образце)
const DIAL_ORDER = ['0','9','8','7','6','5','4','3','2','1'];

function slotIndex(num) {
  // По часовой от ограничителя: 0,9,8,7,6,5,4,3,2,1, затем пустой сектор (idx 10) обратно к ограничителю
  return DIAL_ORDER.indexOf(num);
}

function restAngleOf(num) {
  const idx = slotIndex(num);
  return (STOP_ANGLE + STEP * (idx + 0.5)) % 360;
}

function renderDial() {
  const ring = document.getElementById('holeRing');
  const fingerStop = document.getElementById('fingerStop');
  ring.innerHTML = '';
  const R = 37;
  DIAL_ORDER.forEach(num => {
    const entry = DIRECTORY.find(d => d.number === num);
    const angleDeg = restAngleOf(num);
    const rad = (angleDeg * Math.PI) / 180;
    const x = 50 + R * Math.sin(rad);
    const y = 50 - R * Math.cos(rad);
    const isReady = entry && entry.status === 'ready';
    const hole = document.createElement('button');
    hole.type = 'button';
    hole.className = 'hole' + (isReady ? '' : ' locked');
    hole.style.left = x + '%';
    hole.style.top = y + '%';
    hole.style.transform = 'translate(-50%,-50%)';
    hole.textContent = num;
    hole.setAttribute('aria-label', entry ? entry.title : ('номер ' + num));
    hole.addEventListener('click', () => dialNumber(num));
    ring.appendChild(hole);
  });
  const stopRad = (STOP_ANGLE * Math.PI) / 180;
  const sx = 50 + 44 * Math.sin(stopRad);
  const sy = 50 - 44 * Math.cos(stopRad);
  fingerStop.style.left = sx + '%';
  fingerStop.style.top = sy + '%';
  fingerStop.style.transform = `translate(-50%,-50%) rotate(${STOP_ANGLE}deg)`;
}

function pullAngleFor(num) {
  // Вращение диска ПО ЧАСОВОЙ СТРЕЛКЕ до тех пор, пока лунка цифры не совпадёт
  // с фиксированным ограничителем — единственная величина поворота в этом направлении.
  const rest = restAngleOf(num);
  return ((STOP_ANGLE - rest) + 360) % 360;
}

function dialNumber(num) {
  if (dialing) return;
  dialing = true;
  const outer = document.getElementById('dialOuter');
  const face = document.getElementById('dialFace');
  const readout = document.getElementById('dialReadout');
  const entry = DIRECTORY.find(d => d.number === num);

  outer.classList.add('dialing');
  const pull = pullAngleFor(num);
  const pullMs = 140 + pull * 2.2;

  readout.innerHTML = `Набираю: <span class="active-num">${num}</span>`;
  face.style.transition = `transform ${pullMs}ms cubic-bezier(0.55,0,0.85,0.35)`;
  face.style.transform = `rotate(${pull}deg)`;

  setTimeout(() => {
    face.style.transition = `transform ${pullMs * 0.85}ms cubic-bezier(0.15,0.65,0.35,1)`;
    face.style.transform = 'rotate(0deg)';
    setTimeout(() => {
      dialing = false;
      outer.classList.remove('dialing');
      highlightCartridge(num, entry);
    }, pullMs * 0.85 + 60);
  }, pullMs + 120);
}

function highlightCartridge(num, entry) {
  document.querySelectorAll('.cartridge').forEach(el => el.classList.remove('highlight'));
  const target = document.querySelector(`.cartridge[data-number="${num}"]`);
  if (target) {
    target.classList.add('highlight');
    target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(() => target.classList.remove('highlight'), 1800);
  }
  const readout = document.getElementById('dialReadout');
  if (entry && entry.status === 'ready') {
    readout.innerHTML = `Номер <span class="active-num">${num}</span>: ${entry.title} — открываю…`;
    setTimeout(() => { window.location.href = entry.href; }, 500);
  } else if (entry && entry.status === 'soon') {
    readout.innerHTML = `Номер <span class="active-num">${num}</span>: ${entry.title} (патрон в разработке)`;
  } else {
    readout.innerHTML = `Номер <span class="active-num">${num}</span> свободен`;
  }
}

function setContext(ctx) {
  currentCtx = ctx;
  const sw = document.getElementById('leverSwitch');
  sw.classList.remove('state-on','state-off');
  sw.classList.add(ctx === 'personal' ? 'state-on' : 'state-off');
  sw.setAttribute('aria-checked', ctx === 'personal' ? 'true' : 'false');
  document.getElementById('ctxNote').textContent = ctxNotes[ctx];
}

const leverEl = document.getElementById('leverSwitch');
leverEl.addEventListener('click', () => setContext(currentCtx === 'personal' ? 'business' : 'personal'));
leverEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setContext(currentCtx === 'personal' ? 'business' : 'personal'); }
});

document.getElementById('themeToggle').addEventListener('click', () => {
  const root = document.documentElement;
  root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});
function renderDirectory() {
  const list = document.getElementById('directoryList');
  list.innerHTML = DIRECTORY.map(d =>
    `<li data-number="${d.number}"><span>${d.number}</span><span>${d.title}</span></li>`
  ).join('');
  list.querySelectorAll('li').forEach(li => {
    li.addEventListener('click', () => {
      document.getElementById('directoryModal').hidden = true;
      dialNumber(li.dataset.number);
    });
  });
}

document.getElementById('dialHub').addEventListener('click', () => {
  renderDirectory();
  document.getElementById('directoryModal').hidden = false;
});
document.getElementById('directoryClose').addEventListener('click', () => {
  document.getElementById('directoryModal').hidden = true;
});
document.getElementById('directoryModal').addEventListener('click', (e) => {
  if (e.target.id === 'directoryModal') e.target.hidden = true;
});
renderCartridges();
renderDial();
setContext('personal');
</script>
</body>
</html>
