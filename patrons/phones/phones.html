body{font-family:Arial,sans-serif;background:#f4f4f6;margin:0;padding:20px;color:#222}
h1{text-align:center}
.controls{max-width:900px;margin:0 auto 30px;background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.filters{display:flex;flex-wrap:wrap;gap:15px;margin-bottom:20px}
.filters label{font-size:14px;font-weight:bold}
.filters select{margin-left:6px;padding:4px}
.age-presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.age-presets button{padding:8px 14px;border:1px solid #888;border-radius:20px;background:#eee;cursor:pointer;font-size:13px}
.age-presets button.active{background:#4a6cf7;color:#fff;border-color:#4a6cf7}
.slider-row{display:flex;align-items:center;margin:10px 0}
.slider-row label{width:220px;font-size:14px}
.slider-row input[type=range]{flex:1;margin:0 10px}
.slider-row span{width:40px;text-align:right;font-size:13px}
.podium{max-width:900px;margin:0 auto;display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
.card{background:#fff;border-radius:12px;padding:15px;width:260px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h3{margin:0 0 6px;font-size:16px}
.card .score{font-size:24px;font-weight:bold;color:#4a6cf7}
.card .detail{font-size:12px;color:#555;margin-top:6px;line-height:1.5}
.rank1{border:2px solid #ffcc00}
.rank2{border:2px solid #c0c0c0}
.rank3{border:2px solid #cd7f32}
.loading{max-width:900px;margin:0 auto;text-align:center;padding:20px;color:#666}
.error{max-width:900px;margin:0 auto;background:#fee;color:#900;padding:15px;border-radius:8px}
footer{max-width:900px;margin:30px auto 0;font-size:12px;color:#777;background:#fff;padding:15px;border-radius:12px;white-space:pre-wrap}
</style>
</head>
<body>
<h1>Выбиратор смартфонов</h1>
<div class="controls">
  <div id="loadStatus" class="loading">Загружаю данные из data/phone_items.csv…</div>
  <div class="age-presets" id="agePresets"></div>
  <div class="filters">
    <label>Бюджет: <select id="fBudget"><option value="">Все</option></select></label>
    <label>Формфактор: <select id="fForm"><option value="">Все</option></select></label>
    <label>Переход: <select id="fSwitch"><option value="">Не важно</option>
      <option>iOS-iOS</option><option>iOS-Android</option><option>Android-Android</option><option>Android-iOS</option>
    </select></label>
    <label>Тип бренда: <select id="fBrand"><option value="">Все</option></select></label>
    <label>Только флагманы сегмента: <input type="checkbox" id="fFlagship"></label>
  </div>
  <div id="sliders"></div>
</div>
<div class="podium" id="podium"></div>
<footer id="footer"></footer>

<script>
const scoreCols = ["Компактность","Производительность","Автономность","Прочность","Удобство_связи","Чистота_интерфейса"];
let items = [];
let weightsPresets = {};
let currentWeights = {};

const footerText = `ПРИМЕЧАНИЯ И ДОПУЩЕНИЯ (подвал):
1. Граница между "детьми" и "подростками до 25" условна и объединена в одну группу "Дети_и_подростки_до_25" — отдельных надёжных маркетинговых данных по детской аудитории смартфонов не найдено.
2. Веса возрастных пресетов — экспертная оценка на основе исследований Kantar (Gen Z/Gen Y) и данных по пожилым пользователям в России, а не строгая статистика для каждой вилки.
3. Группа "Свыше 67" — наименее изучена в академических источниках (сами исследования признают нехватку данных по пожилым), поэтому веса здесь наиболее приблизительные.
4. Оценка "Чистота_интерфейса" (1-10) выставлена экспертно по репутации HyperOS/OxygenOS/One UI и может быть скорректирована под личный опыт пользователя.
5. eSIM для OnePlus 13T и Vivo X200 Pro mini требует уточнения по региону продаж — в CSV указано ориентировочно.
6. Цены (Цена_RUB) зафиксированы на июль 2026 и могут измениться из-за роста цен на китайские смартфоны в РФ.
7. Формфактор: 8 из 9 моделей помечены как "стандарт" — категории "лопата", "компакт" и "раскладушка" представлены неполно, фильтр по форм-фактору пока не сбалансирован.
`;
document.getElementById('footer').textContent = footerText;

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',');
  return lines.slice(1).map(line=>{
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h,i)=>{
      let v = vals[i];
      if(v!==undefined && v!==""){
        const num = Number(v);
        obj[h] = isNaN(num) ? v : num;
      } else {
        obj[h] = v;
      }
    });
    return obj;
  });
}

function loadCSV(path){
  return fetch(path).then(r=>{
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  }).then(parseCSV);
}

Promise.all([
  loadCSV('../data/phone_items.csv'),
  loadCSV('../data/phone_age_weight_presets.csv')
]).then(([itemsData, weightsData])=>{
  items = itemsData;
  weightsData.forEach(row=>{
    const group = row["Возрастная_группа"];
    weightsPresets[group] = {};
    scoreCols.forEach(c=>{ weightsPresets[group][c] = row[c]; });
  });
  document.getElementById('loadStatus').style.display = 'none';
  init();
}).catch(err=>{
  document.getElementById('loadStatus').innerHTML =
    `<div class="error">Не удалось загрузить данные (${err.message}). Проверь, что файлы лежат в data/ и сайт открыт через GitHub Pages, а не как локальный файл.</div>`;
});

function init(){
  currentWeights = Object.assign({}, weightsPresets["До_55"] || Object.values(weightsPresets)[0]);

  const budgets = [...new Set(items.map(i=>i["Бюджет_RUB"]))];
  const forms = [...new Set(items.map(i=>i["Формфактор"]))];
  const brands = [...new Set(items.map(i=>i["Тип_бренда"]))];
  budgets.forEach(b=>document.getElementById('fBudget').innerHTML+=`<option value="${b}">${b} тыс руб</option>`);
  forms.forEach(f=>document.getElementById('fForm').innerHTML+=`<option value="${f}">${f}</option>`);
  brands.forEach(b=>document.getElementById('fBrand').innerHTML+=`<option value="${b}">${b}</option>`);

  const presetLabels = {
    "Дети_и_подростки_до_25":"Дети/подростки до 25",
    "До_35":"До 35",
    "До_55":"До 55",
    "До_67":"До 67",
    "Свыше_67":"Свыше 67"
  };
  const presetsDiv = document.getElementById('agePresets');
  Object.keys(weightsPresets).forEach(p=>{
    const btn = document.createElement('button');
    btn.textContent = presetLabels[p] || p;
    btn.dataset.preset = p;
    if(p==="До_55") btn.classList.add('active');
    btn.onclick = ()=>{
      document.querySelectorAll('.age-presets button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentWeights = Object.assign({}, weightsPresets[p]);
      renderSliders();
      render();
    };
    presetsDiv.appendChild(btn);
  });

  renderSliders();
  render();

  ['fBudget','fForm','fSwitch','fBrand','fFlagship'].forEach(id=>{
    document.getElementById(id).addEventListener('change', render);
  });
}

function renderSliders(){
  const cont = document.getElementById('sliders');
  cont.innerHTML='';
  scoreCols.forEach(c=>{
    const row = document.createElement('div');
    row.className='slider-row';
    const val = Math.round((currentWeights[c]||0)*100);
    row.innerHTML = `<label>${c}</label><input type="range" min="0" max="50" value="${val}" data-crit="${c}"><span>${val}%</span>`;
    cont.appendChild(row);
  });
  cont.querySelectorAll('input[type=range]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      currentWeights[e.target.dataset.crit] = e.target.value/100;
      e.target.nextElementSibling.textContent = e.target.value+'%';
      render();
    });
  });
}

function filteredItems(){
  const b = document.getElementById('fBudget').value;
  const f = document.getElementById('fForm').value;
  const br = document.getElementById('fBrand').value;
  const flag = document.getElementById('fFlagship').checked;
  return items.filter(i=>
    (!b || String(i["Бюджет_RUB"])===b) &&
    (!f || i["Формфактор"]===f) &&
    (!br || i["Тип_бренда"]===br) &&
    (!flag || i["Флагман_в_сегменте"]==="да")
  );
}

function render(){
  const data = filteredItems().map(i=>{
    let score = 0;
    scoreCols.forEach(c=>score += (i[c]||0)*currentWeights[c]);
    return {item:i, score: Math.round(score*100)/100};
  }).sort((a,b)=>b.score-a.score).slice(0,3);

  const podium = document.getElementById('podium');
  podium.innerHTML='';
  data.forEach((d,idx)=>{
    const card = document.createElement('div');
    card.className = 'card rank'+(idx+1);
    card.innerHTML = `<h3>#${idx+1} ${d.item["Модель"]}</h3>
      <div class="score">${d.score}</div>
      <div class="detail">
        Цена: ${d.item["Цена_RUB"]} руб<br>
        Экран: ${d.item["Экран_дюйм"]}" | ${d.item["ОЗУ_ГБ"]}/${d.item["ПЗУ_ГБ"]} ГБ<br>
        Батарея: ${d.item["Батарея_мАч"]} мАч, ${d.item["Зарядка_Вт"]} Вт<br>
        Защита: ${d.item["Защита_IP"]} | NFC: ${d.item["NFC"]} | eSIM: ${d.item["eSIM"]}
      </div>`;
    podium.appendChild(card);
  });
}
</script>
</body>
</html>
