  scoreCols.forEach(c=>{

  });

  });
}

    (!f || i["Формфактор"]===f) &&
    (!br || i["Тип_бренда"]===br) &&
    (!flag || i["Флагман_в_сегменте"]==="да")
  );
}

function render(){
  const data = filteredItems().map(i=>{
    let score = 0;
    scoreCols.forEach(c=>score += (i[c]||0)*currentWeights[c]);
    return {item:i, score: Math.round(score*100)/100};
  }).sort((a,b)=>b.score-a.score).slice(0,3);

  const podium = document.getElementById('podium');
  podium.innerHTML='';
  data.forEach((d,idx)=>{
    const card = document.createElement('div');
    card.className = 'card rank'+(idx+1);
    card.innerHTML = `<h3>#${idx+1} ${d.item["Модель"]}</h3>
      <div class="score">${d.score}</div>
      <div class="detail">
        Цена: ${d.item["Цена_RUB"]} руб<br>
        Экран: ${d.item["Экран_дюйм"]}" | ${d.item["ОЗУ_ГБ"]}/${d.item["ПЗУ_ГБ"]} ГБ<br>
        Батарея: ${d.item["Батарея_мАч"]} мАч, ${d.item["Зарядка_Вт"]} Вт<br>
        Защита: ${d.item["Защита_IP"]} | NFC: ${d.item["NFC"]} | eSIM: ${d.item["eSIM"]}
      </div>`;
    podium.appendChild(card);
  });
}

['fBudget','fForm','fSwitch','fBrand','fFlagship'].forEach(id=>{
  document.getElementById(id).addEventListener('change', render);
});

renderSliders();
render();
</script>
</body>
</html>
