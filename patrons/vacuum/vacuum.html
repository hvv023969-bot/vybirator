:root, [data-theme="light"] {
  --bg:#f7f6f2; --surface:#fbfbf9; --surface-2:#f1eee8; --border:#d4d1ca;
  --text:#28251d; --muted:#706c65; --primary:#01696f; --gold:#d19900;
  --silver:#8a8f96; --bronze:#a1622f; --shadow:0 10px 24px rgba(18,18,18,.08);
  --radius:18px; --font:"Satoshi",system-ui,sans-serif;
}
[data-theme="dark"] {
  --bg:#171614; --surface:#1c1b19; --surface-2:#26231f; --border:#3a3732;
  --text:#ebe5db; --muted:#ada597; --primary:#4f98a3; --gold:#e8af34;
  --silver:#9aa0a5; --bronze:#c17a45; --shadow:0 14px 30px rgba(0,0,0,.28);
}
* { box-sizing:border-box; }
body { margin:0; font-family:var(--font); background:linear-gradient(180deg,var(--bg),var(--surface-2)); color:var(--text); min-height:100dvh; }
.app { max-width:960px; margin:0 auto; padding:1.2rem 1rem 3rem; }
.back { display:inline-flex; align-items:center; gap:.4rem; color:var(--primary); text-decoration:none; font-weight:700; font-size:.9rem; margin-bottom:1rem; }
.top { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:1rem; }
h1 { margin:0 0 .3rem; font-size:clamp(1.3rem,1.1rem + 1vw,1.9rem); }
.sub { color:var(--muted); font-size:.9rem; max-width:60ch; }
.data-note { display:inline-flex; align-items:center; gap:.4rem; margin-top:.5rem; padding:.35rem .7rem; border-radius:999px; background:var(--surface-2); color:var(--muted); font-size:.78rem; font-weight:600; }
.theme { min-width:44px; min-height:44px; border-radius:999px; background:var(--surface); color:var(--text); border:1px solid var(--border); padding:0 1rem; font:inherit; cursor:pointer; }
.controls { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:1.1rem 1.2rem; margin-bottom:1.4rem; display:grid; gap:1rem; }
.slider-row { display:grid; grid-template-columns:1fr auto; align-items:center; gap:.6rem; }
.slider-row label { font-weight:700; font-size:.88rem; }
.slider-row .val { font-weight:800; color:var(--primary); font-size:.88rem; min-width:2.4em; text-align:right; }
input[type=range] { grid-column:1/-1; width:100%; height:6px; border-radius:999px; background:var(--surface-2); accent-color:var(--primary); }
.podium-wrap { display:flex; align-items:flex-end; justify-content:center; gap:.9rem; margin:1.6rem 0; min-height:220px; }
.podium-slot { display:flex; flex-direction:column; align-items:center; gap:.5rem; width:31%; }
.podium-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); padding:.8rem .7rem; text-align:center; width:100%; }
.podium-card .name { font-weight:800; font-size:.92rem; line-height:1.2; }
.podium-card .score { font-size:.8rem; color:var(--muted); margin-top:.2rem; }
.podium-base { width:100%; border-radius:10px 10px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:.5rem; font-weight:900; font-size:1.4rem; color:#fff; }
.podium-base.gold { height:110px; background:linear-gradient(180deg,var(--gold),color-mix(in srgb,var(--gold) 70%,black)); }
.podium-base.silver { height:82px; background:linear-gradient(180deg,var(--silver),color-mix(in srgb,var(--silver) 70%,black)); }
.podium-base.bronze { height:60px; background:linear-gradient(180deg,var(--bronze),color-mix(in srgb,var(--bronze) 70%,black)); }
.podium-slot:nth-child(1) { order:2; } .podium-slot:nth-child(2) { order:1; } .podium-slot:nth-child(3) { order:3; }
.list { display:grid; gap:.7rem; }
.item-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.item-card .item-row { padding:.8rem 1rem; display:flex; justify-content:space-between; align-items:center; gap:1rem; cursor:pointer; border:none; }
.item-card .item-row .name { font-weight:700; font-size:.92rem; }
.item-card .item-row .brand { color:var(--muted); font-size:.78rem; }
.score-wrap { display:flex; align-items:center; gap:.5rem; }
.score-wrap .score { font-weight:800; color:var(--primary); }
.chevron { display:inline-block; color:var(--muted); font-size:1.1rem; transition:transform .2s ease; }
.item-row.open .chevron { transform:rotate(90deg); }
.breakdown { padding:.4rem 1rem 1rem; display:grid; gap:.5rem; border-top:1px solid var(--border); }
.bd-row { display:grid; grid-template-columns:9rem 1fr 11rem; align-items:center; gap:.6rem; }
.bd-label { font-size:.8rem; color:var(--text); font-weight:600; }
.bd-bar-wrap { height:8px; border-radius:999px; background:var(--surface-2); overflow:hidden; }
.bd-bar { display:block; height:100%; background:var(--primary); border-radius:999px; }
.bd-nums { font-size:.78rem; color:var(--muted); text-align:right; white-space:nowrap; }
.bd-nums b { color:var(--primary); }
@media (max-width:520px) { .bd-row { grid-template-columns:1fr; gap:.25rem; } .bd-nums { text-align:left; } }
.loading, .error { text-align:center; color:var(--muted); padding:2rem 0; }
footer { max-width:960px; margin:1.5rem auto 0; font-size:.78rem; color:var(--muted); background:var(--surface); padding:1rem 1.1rem; border-radius:14px; white-space:pre-wrap; border:1px solid var(--border); }
</style>
</head>
<body>
<div class="app">
  <a class="back" href="../../index.html">&larr; к барабану</a>
  <div class="top">
    <div>
      <h1>Выбиратор пылесосов</h1>
      <div class="sub">Сравнение моделей по цене, мощности, весу, шуму, автономности и качеству уборки твёрдых полов.</div>
      <div class="data-note" id="dataNote"></div>
    </div>
    <button class="theme" id="themeToggle">Тема</button>
  </div>
  <div class="controls" id="controls">
    <div class="loading">Загружаю данные (vacuum_items.csv)...</div>
  </div>
  <div class="podium-wrap" id="podium"></div>
  <div class="list" id="list"></div>
</div>
<footer id="footer"></footer>
<script>
const CRITERIA = [
  { key:"price", label:"Цена", invert:true },
  { key:"power", label:"Мощность" },
  { key:"lightness", label:"Лёгкость" },
  { key:"noise", label:"Тихая работа", invert:true, raw:"noise", asQuiet:true },
  { key:"runtime", label:"Автономность" },
  { key:"smoothFloor", label:"Гладкий пол" }
];
let weights = { price:20, power:15, lightness:15, noise:15, runtime:15, smoothFloor:20 };
let items = [];

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const vals = line.split(",");
    const obj = {};
    headers.forEach((h,i) => {
      const v = vals[i];
      const num = Number(v);
      obj[h] = (v !== undefined && !isNaN(num) && v.trim() !== "") ? num : v;
    });
    return obj;
  });
}

function loadCSV(path) {
  return fetch(path).then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.text();
  }).then(parseCSV);
}

Promise.all([
  fetch("../data/vacuum_items.csv"),
  fetch("../data/vacuum_footer_notes.txt").then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.text();
  })
]).then(async ([itemsRes, footerText]) => {
  if (!itemsRes.ok) throw new Error("HTTP " + itemsRes.status);
  const lastModified = itemsRes.headers.get("Last-Modified");
  if (lastModified) {
    const d = new Date(lastModified);
    const formatted = d.toLocaleDateString("ru-RU", { day:"numeric", month:"long", year:"numeric" });
    document.getElementById("dataNote").textContent = "Данные обновлены: " + formatted + ". Перед покупкой проверь актуальность цен.";
  } else {
    document.getElementById("dataNote").textContent = "Дата обновления данных не определена.";
  }
  const itemsText = await itemsRes.text();
  items = parseCSV(itemsText);
  document.getElementById("footer").textContent = footerText;
  renderControls();
  renderResults();
}).catch(err => {
  document.getElementById("controls").innerHTML =
    '<div class="error">Не удалось загрузить данные (' + err.message + '). ' +
    'Проверь, что файлы vacuum_items.csv и vacuum_footer_notes.txt лежат в data/, ' +
    'и сайт открыт через GitHub Pages, а не как локальный файл.</div>';
});

function normalize(arr) {
  const min = Math.min(...arr), max = Math.max(...arr);
  if (max === min) return arr.map(() => 50);
  return arr.map(v => (v - min) / (max - min) * 100);
}

function computeScores() {
  const cols = {};
  CRITERIA.forEach(c => {
    let raw = items.map(it => c.asQuiet ? (100 - it.noise) : it[c.key]);
    let norm = normalize(raw);
    if (c.invert && !c.asQuiet) norm = norm.map(v => 100 - v);
    cols[c.key] = norm;
  });
  const totalWeight = Object.values(weights).reduce((a,b) => a+b, 0) || 1;
  return items.map((it, i) => {
    let sum = 0;
    const breakdown = CRITERIA.map(c => {
      const normScore = cols[c.key][i];
      const weight = weights[c.key];
      const contribution = normScore * weight / totalWeight;
      sum += contribution;
      return { key:c.key, label:c.label, normScore, weight, contribution };
    });
    return { ...it, score: sum, breakdown };
  }).sort((a,b) => b.score - a.score);
}

function renderControls() {
  const el = document.getElementById("controls");
  el.innerHTML = CRITERIA.map(c =>
    '<div class="slider-row"><label for="w_' + c.key + '">' + c.label + '</label>' +
    '<span class="val" id="v_' + c.key + '">' + weights[c.key] + '</span>' +
    '<input type="range" min="0" max="40" value="' + weights[c.key] + '" id="w_' + c.key + '" data-key="' + c.key + '"></div>'
  ).join("");
  CRITERIA.forEach(c => {
    document.getElementById("w_" + c.key).addEventListener("input", e => {
      weights[c.key] = Number(e.target.value);
      document.getElementById("v_" + c.key).textContent = e.target.value;
      renderResults();
    });
  });
}

function renderResults() {
  const ranked = computeScores();
  const top3 = ranked.slice(0,3);
  const podium = document.getElementById("podium");
  const classes = ["gold","silver","bronze"];
  podium.innerHTML = top3.map((it,i) =>
    '<div class="podium-slot"><div class="podium-card"><div class="name">' + it.name + '</div>' +
    '<div class="score">' + it.score.toFixed(1) + '</div></div>' +
    '<div class="podium-base ' + classes[i] + '">' + (i+1) + '</div></div>'
  ).join("");

  const list = document.getElementById("list");
  list.innerHTML = ranked.map((it,i) =>
    '<div class="item-card"><div class="item-row" data-idx="' + i + '">' +
    '<div><div class="name">' + (i+1) + '. ' + it.name + '</div>' +
    '<div class="brand">' + it.brand + ' · ' + it.price + ' RUB</div></div>' +
    '<div class="score-wrap"><div class="score">' + it.score.toFixed(1) + '</div>' +
    '<span class="chevron">&rsaquo;</span></div></div>' +
    '<div class="breakdown" id="bd' + i + '" hidden>' +
    it.breakdown.map(b =>
      '<div class="bd-row"><span class="bd-label">' + b.label + '</span>' +
      '<span class="bd-bar-wrap"><span class="bd-bar" style="width:' + b.normScore.toFixed(0) + '%"></span></span>' +
      '<span class="bd-nums">' + b.normScore.toFixed(0) + '% · вес ' + b.weight + ' · <b>' + b.contribution.toFixed(1) + '</b></span></div>'
    ).join("") +
    '</div></div>'
  ).join("");

  list.querySelectorAll(".item-row").forEach(row => {
    row.addEventListener("click", () => {
      const idx = row.dataset.idx;
      const bd = document.getElementById("bd" + idx);
      const isOpen = !bd.hidden;
      bd.hidden = isOpen;
      row.classList.toggle("open", !isOpen);
    });
  });
}

document.getElementById("themeToggle").addEventListener("click", () => {
  const root = document.documentElement;
  root.setAttribute("data-theme", root.getAttribute("data-theme") === "dark" ? "light" : "dark");
});
</script>
</body>
